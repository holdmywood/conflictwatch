name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  worker:
    name: Worker tests + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @conflictwatch/db generate
      # Held-out-date point-in-time tests are part of this suite and are a hard gate.
      - run: pnpm --filter worker test
      - run: npx tsc --noEmit
        working-directory: apps/worker

  web:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @conflictwatch/db generate
      - run: pnpm --filter web test
      - run: npx tsc --noEmit
        working-directory: apps/web
      - run: pnpm --filter web build
